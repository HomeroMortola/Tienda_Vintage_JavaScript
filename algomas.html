<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar FIFA</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

.navbar {
    background-color: #0b3d91;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
}

.logo {
    color: white;
    font-size: 26px;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 25px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo"> IDEA</div>

    <div class="menu">
        <a href="#">TORNEOS</a>
        <a href="#">PARTIDOS</a>
        <a href="#">NOTICIAS</a>
        <a href="#">CLASIFICACIONES</a>
        <a href="#">JUEGO</a>
        <a href="#">TIENDA</a>
    </div>
</div>

</body>
</html>
