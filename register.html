<!DOCTYPE html>
<html lang="es">
<head>
  <script type="importmap">{"imports": {"@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"}}</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrarse — Retro Vibes Co.</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">
  <header class="masthead admin-masthead">
    <div class="ornament-line">✦ &nbsp; Registro de Cliente &nbsp; ✦</div>
    <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    <div class="masthead-rule"></div>
  </header>

  <div class="admin-form-wrap">
    <h2 class="admin-title">Nueva Cuenta</h2>
    <div class="admin-rule"></div>

    <div class="form-grid">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="reg-name" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" id="reg-surname" placeholder="Tu apellido">
      </div>

      <div class="form-group">
        <label>DNI</label>
        <input type="text" id="reg-dni" placeholder="12345678">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="number" id="reg-phone" placeholder="ejemplo: 3795341234">
      </div>

      <div class="form-group full">
        <label>Ubicación</label>
        <select name="Location" id="LocationClient" class="select-input">
          <option value="Corrientes, Argentina">Corrientes, Argentina</option>
          <option value="Buenos Aires, Argentina">Buenos Aires, Argentina</option>
          <option value="Chaco, Argentina">Chaco, Argentina</option>
          <option value="Santa Fe, Argentina">Santa Fe, Argentina</option>
          <option value="Misiones, Argentina">Misiones, Argentina</option>
          <option value="Entre Ríos, Argentina">Entre Ríos, Argentina</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Correo Electrónico</label>
        <input type="email" id="reg-email" placeholder="tu@email.com">
      </div>

      <div class="form-group full">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" id="btn-register" color="#000000">Crear Cuenta</button>
    </div>
    
    <div class="login-redirect">
      <p>¿Ya tenés una cuenta?</p>
      <a href="login.html" class="login-link">Iniciar sesión</a>
    </div>

    <p id="reg-error" style="color: #000000; display: none; text-align: center; margin-top: 20px; font-family: var(--f-body);"></p>
  </div>
</div>

<script type="module" src="./RegisterScripts.js"></script>
</body>
</html>
