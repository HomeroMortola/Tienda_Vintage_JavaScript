<!DOCTYPE html>
<html lang="es">
<head>
  <script type="importmap">{"imports": {"@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"}}</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrarse — Retro Vibes Co.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">
  <header class="masthead admin-masthead">
    <div class="ornament-line">✦ &nbsp; Registro de Cliente &nbsp; ✦</div>
    <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    <div class="masthead-rule"></div>
  </header>

  <div class="admin-form-wrap">
    <h2 class="admin-title">Nueva Cuenta</h2>
    <div class="admin-rule"></div>

    <div class="form-grid">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="reg-name" placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" id="reg-surname" placeholder="Tu apellido">
      </div>

      <div class="form-group">
        <label>DNI (8 dígitos)</label>
        <input type="text" id="reg-dni" placeholder="12345678">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="number" id="reg-phone" placeholder="Solo números">
      </div>

      <div class="form-group full">
        <label>Ubicación / Dirección</label>
        <input type="text" id="reg-location" placeholder="Ciudad, Calle, Altura">
      </div>

      <div class="form-group full">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" id="btn-register">Crear Cuenta</button>
    </div>
    
    <p id="reg-error" style="color: #d9534f; display: none; text-align: center; margin-top: 20px; font-family: var(--f-body);"></p>
  </div>
</div>

<script type="module" src="./RegisterScripts.js"></script>
</body>
</html>
