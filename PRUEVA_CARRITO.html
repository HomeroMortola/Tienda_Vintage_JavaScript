<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito - Retro Vibes Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Oswald:wght@300;400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    }
  }
  </script>

  <style>
    .test-cart-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        color: #333;
    }
    .test-cart-item {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
    }
    .test-cart-item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
    }
    .test-item-details { flex-grow: 1; }
    .qty-controls {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 10px;
    }
    .qty-btn {
        background: #eee;
        border: 1px solid #ccc;
        padding: 2px 10px;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
    }
    .qty-btn:hover { background: #ddd; }
    .remove-btn {
        background: #ff4d4d;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .remove-btn:hover { background: #e60000; }
    .test-total-box {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        padding-top: 20px;
        font-size: 1.5rem;
        border-top: 2px solid #333;
    }
    .vaciar-btn {
        background: transparent;
        border: 2px solid #ff4d4d;
        color: #ff4d4d;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
    }
    .vaciar-btn:hover { background: #ff4d4d; color: white; }
  </style>
</head>

<body class="home-page">
<div class="shell">

  <header class="masthead">
    <div class="ornament-line">✦ &nbsp; Tienda de artículos vintage &nbsp; ✦</div>
    <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    <div class="brand-tagline">Vinilos · Bandanas · Anteojos · Est. 1974</div>
    <div class="masthead-rule"></div>
  </header>

  <div class="header-row">
    <div class="nav-band">
      <a href="index.html" class="nav-item">Inicio</a>
      <a href="vinilos.html" class="nav-item">Vinilos</a>
      <a href="bandanna.html" class="nav-item">Bandanas</a>
      <a href="anteojos.html" class="nav-item">Anteojos</a>
      <a href="T_Shirts.html" class="nav-item">Remeras</a>
    </div>
  </div>

  <div class="test-cart-container">
      <div id="cart-content">
          <p style="text-align: center;">Cargando productos...</p>
      </div>
      
      <div class="test-total-box">
          <button class="vaciar-btn" onclick="vaciarCarrito()">Vaciar Carrito</button>
          <div>Total: <strong id="cart-final-total">$0.00</strong></div>
      </div>
  </div>

</div>

<script type="module">
  import { supabase } from './src/config/supabase.js';
  import { CartRepository } from './src/repositories/CartRepository.js';

  const cartRepo = new CartRepository();
  const userId = localStorage.getItem('usuarioId');
  const fmt = (n) => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  window.cargarCarrito = async () => {
    const contentDiv = document.getElementById('cart-content');
    const totalSpan = document.getElementById('cart-final-total');
    
    if (!userId) {
      contentDiv.innerHTML = '<p style="color: red; text-align: center;">Debes iniciar sesión para ver tu carrito.</p>';
      totalSpan.textContent = '$0.00';
      return;
    }

    try {
      const items = await cartRepo.getCart(userId);
      
      if (!items || items.length === 0) {
        contentDiv.innerHTML = '<p style="text-align: center; font-style: italic;">🛒 Tu carrito está vacío. ¡Ve a comprar algo!</p>';
        totalSpan.textContent = '$0.00';
        return;
      }

      let html = '';
      let totalAmount = 0;

      items.forEach(item => {
        const p = item.product; 
        if (!p) return; 

        const subtotal = p.price * item.quantity;
        totalAmount += subtotal;

        // Diseño del carrito de prueba + Botones de acciones
        html += `
          <div class="test-cart-item">
              <img src="${p.image_url || 'https://via.placeholder.com/80'}" alt="${p.name}">
              
              <div class="test-item-details">
                  <h3 style="margin: 0 0 5px 0;">${p.name}</h3>
                  <p style="margin: 0; color: #666; font-size: 0.9em;">Categoría: ${p.category}</p>
                  
                  <div class="qty-controls">
                      <button class="qty-btn" onclick="updateQty('${item.cartItemId}', ${item.quantity - 1})">-</button>
                      <span style="font-size: 1.1em;"><strong>${item.quantity}</strong></span>
                      <button class="qty-btn" onclick="updateQty('${item.cartItemId}', ${item.quantity + 1})">+</button>
                      <span style="color: #666; font-size: 0.9em;">x ${fmt(p.price)} c/u</span>
                  </div>
              </div>
              
              <div style="font-weight: bold; font-size: 1.2rem;">
                  ${fmt(subtotal)}
              </div>
              
              <button class="remove-btn" onclick="eliminarItem('${item.cartItemId}')" title="Eliminar producto">✕</button>
          </div>
        `;
      });

      contentDiv.innerHTML = html;
      totalSpan.textContent = fmt(totalAmount);

    } catch (error) {
      console.error("Error al cargar el carrito:", error);
      contentDiv.innerHTML = '<p style="color: red; text-align: center;">Ocurrió un error al cargar la base de datos.</p>';
    }
  };

  // Funciones de acción
  window.updateQty = async (itemId, newQty) => {
    if (newQty < 1) return; // Evita poner cantidad en 0 o negativo
    try {
      await supabase.from('cart_items').update({ quantity: newQty }).eq('id', itemId);
      cargarCarrito(); // Recargamos para actualizar subtotales
    } catch (e) { 
        console.error("Error actualizando cantidad:", e); 
    }
  };

  window.eliminarItem = async (itemId) => {
    if (!confirm("¿Seguro que quieres eliminar este artículo?")) return;
    try {
      await cartRepo.removeItem(itemId);
      cargarCarrito();
    } catch (e) { 
        console.error("Error eliminando:", e); 
    }
  };

  window.vaciarCarrito = async () => {
    if (!confirm("¿Seguro que quieres vaciar todo tu carrito?")) return;
    try {
      await cartRepo.clearCart(userId);
      cargarCarrito();
    } catch (e) { 
        console.error("Error vaciando:", e); 
    }
  };

  // Cargar al inicio
  document.addEventListener('DOMContentLoaded', cargarCarrito);
</script>
</body>
</html>
