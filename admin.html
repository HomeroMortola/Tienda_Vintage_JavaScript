  <!DOCTYPE html>
  <html lang="es">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script type="importmap">{"imports": {"@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"}}</script>
    <title>Admin - Retro Vibes Co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Oswald:wght@300;400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="./adminScript.js"></script>
  </head>

  <body class="home-page">
  <div class="shell">

    <header class="masthead">
      <div class="ornament-line">✦ Panel de Administración ✦</div>
      <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    
      <div class="masthead-rule"></div>
    </header>

    <div style="max-width:400px; margin:80px auto 0;">

      <div class="form-grid">

        <div class="form-group full">
          <label>Usuario</label>
          <input type="text" id="user-input" placeholder="admin"/>
        </div>

        <div class="form-group full">
          <label>Contraseña</label>
          <input type="password" id="pass-input" placeholder="••••••••"onkeydown="if(event.key==='Enter') doLogin()"/>
        </div>

      </div>

      <div id="login-error" class="error-msg" style="display:none; margin-top:10px; text-align:center;">
        Usuario o contraseña incorrectos
      </div>

      <button class="btn-primary"style="width:100%; margin-top:20px; font-size:12px; padding:16px;"onclick="doLogin()">Ingresar</button>

      <div style="text-align:center; margin-top:16px;">
        <a href="retro-vibes.html" class="prod-cat" style="color:var(--ink-muted); text-decoration:none;">← Volver a la tienda</a>
      </div>

    </div>
  </div>

  <div id="toast">Bienvenido ✓</div>
  
  </body>
  </html>
