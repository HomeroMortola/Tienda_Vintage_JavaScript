<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Checkout - Retro Vibes Co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Oswald:wght@300;400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>

<body class="Checkout-page">
    <div class="shell">
        <header class="masthead">
            <div class="ornament-line">✦ Panel de Pagos ✦</div>
            <div class="brand-name"><span>Retro</span> Vibes Co.</div>
            <div class="masthead-rule"></div>
        </header>

        <div style="max-width:400px; margin:80px auto 0;">
            <form id="checkout-form" onsubmit="return false;">
                <div class="form-grid">
                    <div id="login-error" class="error-msg" style="display:none; margin-top:10px; text-align:center;">
                        Por favor, complete todos los campos
                    </div>

                    <div class="form-group full">
                        <label for="name-input">Nombre</label>
                        <input type="text" id="name-input" placeholder="Juan" required/>
                    </div>
                    <div class="form-group full">
                        <label for="lastname-input">Apellido</label>
                        <input type="text" id="lastname-input" placeholder="Pérez" required/>
                    </div>
                    <div class="form-group full">
                        <label for="email-input">Correo Electrónico</label>
                        <input type="email" id="email-input" placeholder="juan.perez@example.com" required/>
                    </div>
                    </div>

                <div id="payment-brick-container" style="margin-top: 20px;"></div>
            </form>

            <div style="text-align:center; margin-top:16px;">
                <a href="carrito.html" class="prod-cat" style="color:var(--ink-muted); text-decoration:none;">← Volver al carrito</a>
            </div>

            <div id="toast" style="display:none;">Compra realizada con éxito ✓</div>
        </div>
    </div>

    <script type="module" src="checkout.js"></script>
</body>
</html>
