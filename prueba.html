<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administrador - Carga de Productos</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .campo { margin-bottom: 15px; display: flex; flex-direction: column; }
        #campos-dinamicos { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 10px; }
        button { background: #0070f3; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #0051a2; }
        img#preview { max-width: 100px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h2>Agregar Nuevo Producto</h2>

    <div class="campo">
        <label>Tipo de Producto:</label>
        <select id="tipo-producto">
            <option value="">-- Seleccionar --</option>
            <option value="T_Shirt">Remera</option>
            <option value="Vinyls">Vinilo</option>
            <option value="Glases">Ante ojos</option>
            <option value="Bandanna">Bandanna</option>
        </select>
    </div>

    <div class="campo">
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Ej: Remera Oficial">
    </div>

    <div class="campo">
        <label>Precio:</label>
        <input type="number" id="precio" step="0.01">
    </div>

    <div class="campo">
        <label>Stock:</label>
        <input type="number" id="stock">
    </div>

    <div class="campo">
        <label>Imagen:</label>
        <input type="file" id="foto-input" accept="image/*">
        <img id="preview" src="" alt="Previsualización">
    </div>

    <div id="campos-dinamicos">
        <p style="color: #666;">Seleccioná un tipo para ver campos específicos.</p>
    </div>

    <button id="btn-guardar" style="margin-top: 20px; width: 100%;">Guardar Producto</button>

    <script type="importmap">
    {
        "imports": {
            "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    }
}

</script>

    <script type="module">
    import { PRODUCT_CONFIG } from './src/utils/ProductFactory.js';
    import { saveProduct } from './src/repositories/ProductRepository.js';

    // Envolvemos todo en un listener para esperar al HTML
    document.addEventListener('DOMContentLoaded', () => {
    const selectTipo = document.getElementById('tipo-producto');
    const contenedorCampos = document.getElementById('campos-dinamicos');

    // DEBUG: Esto te dirá en la consola (F12) si encontró los elementos
    console.log("Select encontrado:", !!selectTipo);
    console.log("Contenedor encontrado:", !!contenedorCampos);

    if (selectTipo && contenedorCampos) {
        selectTipo.addEventListener('change', (e) => {
            const tipo = e.target.value;
            const config = PRODUCT_CONFIG[tipo];

            // Limpiamos siempre antes de dibujar
            contenedorCampos.innerHTML = '';

            if (config) {
                console.log(`Dibujando campos para: ${tipo}`);
                
                config.fields.forEach(campo => {
                    const div = document.createElement('div');
                    div.style.marginBottom = "15px";
                    
                    // IMPORTANTE: id con prefijo "extra-" para el guardado
                    div.innerHTML = `
                        <label style="display:block; font-weight:bold;">${campo.label}:</label>
                        <input type="${campo.type}" id="extra-${campo.id}" class="input-dinamico">
                    `;
                    contenedorCampos.appendChild(div);
                });
            } else {
                console.warn("No se encontró configuración para el tipo:", tipo);
            }
        });
    }
    });

    
    document.addEventListener('DOMContentLoaded', () => {
    const btnGuardar = document.getElementById('btn-guardar');
    // 2. Lógica del Botón Guardar (Reemplaza al onclick)
        if (btnGuardar) {
            btnGuardar.addEventListener('click', async () => {
                const tipo = selectTipo.value;
                if (!tipo) return alert("Seleccioná un tipo de producto");

                const config = PRODUCT_CONFIG[tipo];
                
                // Instanciamos el Builder usando la Factory
                const builder = config.builder();

                // Seteamos los datos básicos
                builder.setName(document.getElementById('nombre').value)
                       .setPrice(parseFloat(document.getElementById('precio').value))
                       .setStock(parseInt(document.getElementById('stock').value))
                       .setCategory(tipo)
                       .setDescription("Carga desde panel admin");

                // Seteamos los datos dinámicos (los que tienen prefijo extra-)
                config.fields.forEach(campo => {
                    const valor = document.getElementById(`extra-${campo.id}`).value;
                    if (builder[campo.setter]) {
                        builder[campo.setter](valor);
                    }
                });

                const productoFinal = builder.build();

                try {
                    console.log("Enviando producto...", productoFinal);
                    const resultado = await repo.saveProduct(productoFinal);
                    alert("¡Producto guardado y sincronizado!");
                } catch (error) {
                    console.error("Error en el flujo de guardado:", error);
                    alert("Hubo un error al guardar.");
                }
            });
        }
    });
    
    </script>
</body>
</html>
