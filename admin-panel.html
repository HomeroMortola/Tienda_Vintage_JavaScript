<!DOCTYPE html>
<html lang="es">
<head>
  <script type="importmap">{"imports": {"@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"}}</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Retro Vibes Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
<div class="shell">

  <header class="masthead admin-masthead">
    <div class="ornament-line">✦ &nbsp; Panel de Administración &nbsp; ✦</div>
    <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    <div class="brand-tagline">Vinilos · Bandanas · Anteojos · Est. 1974</div>
    <div class="masthead-rule"></div>
  </header>

  <div class="nav-band">
    <a href="retro-vibes.html" class="nav-item">Catálogo</a>
    <a href="vinilos.html" class="nav-item">Vinilos</a>
    <a href="bandanna.html" class="nav-item">Bandanas</a>
    <a href="anteojos.html" class="nav-item">Anteojos</a>
    <a href="carrito.html" class="nav-item">Carrito</a>
    <div class="nav-item active">Admin</div>
  </div>

  <div class="admin-form-wrap">
    <h2 class="admin-title">Agregar Nuevo Producto</h2>
    <div class="admin-rule"></div>

    <div class="form-grid" style="grid-template-columns: 1fr;">

      <div class="form-group full">
        <label>Tipo de Producto</label>
        <select id="tipo-producto">
          <option value="">— Seleccionar —</option>
          <option value="T_Shirt">T-Shirt</option>
          <option value="Vinyls">Vinilos</option>
          <option value="Glasses">Anteojos</option>
          <option value="Bandanna">Bandanas</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Ej: Remera Oficial">
      </div>

      <div class="form-group full">
        <label>Precio</label>
        <input type="number" id="precio" step="0.01" placeholder="0.00">
      </div>

      <div class="form-group full">
        <label>Stock</label>
        <input type="number" id="stock" placeholder="0">
      </div>

      <div class="form-group full">
        <label>Imagen</label>
        <input type="file" id="foto-input" accept="image/*">
        <img id="preview" src="" alt="Previsualización">
      </div>

    </div>

    <!-- Campos dinámicos -->
    <div class="dynamic-block" style="margin-top: 20px;">
      <div class="dynamic-block-head">Campos específicos del tipo</div>
      <div class="dynamic-block-body" id="campos-dinamicos">
        <p class="dynamic-placeholder">Seleccioná un tipo para ver los campos específicos.</p>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" id="btn-save">Guardar Producto</button>
    </div>
  </div>

  <footer style="text-align:center; margin-top:60px; padding-top:20px; border-top:1px solid var(--paper-deep);">
    <span class="prod-cat" style="font-size:8px; color:var(--paper-deep); letter-spacing:2px;">
      © 1974 Retro Vibes Co. &nbsp;·&nbsp;
      <a href="admin.html" style="color:var(--paper-deep); text-decoration:none;">Admin</a>
    </span>
  </footer>

</div>

<script type="module">
  import { PRODUCT_CONFIG } from './src/utils/ProductFactory.js';
  import { ProductRepository } from './src/repositories/ProductRepository.js';

  const repo = new ProductRepository();

  document.addEventListener('DOMContentLoaded', () => {
    const selectTipo = document.getElementById('tipo-producto');
    const contenedorCampos = document.getElementById('campos-dinamicos');
    const btnSave = document.getElementById('btn-save');

    if (selectTipo && contenedorCampos) {
      selectTipo.addEventListener('change', (e) => {
        const type = e.target.value;
        const config = PRODUCT_CONFIG[type];
        contenedorCampos.innerHTML = '';

        if (config) {
          config.fields.forEach(campo => {
            const div = document.createElement('div');
            div.className = 'form-group full';
            div.style.borderRight = 'none';
            div.innerHTML = `
              <label>${campo.label}</label>
              <input type="${campo.type}" id="extra-${campo.id}" class="input-dinamico">
            `;
            contenedorCampos.appendChild(div);
          });
        } else {
          contenedorCampos.innerHTML = '<p class="dynamic-placeholder">Seleccioná un tipo para ver los campos específicos.</p>';
        }
      });
    }

    if (btnSave) {
      btnSave.addEventListener('click', async (e) => {
        e.preventDefault();
        const tipo = selectTipo.value;
        const file = document.getElementById('foto-input').files[0];
        let publicUrl = "";
        if (file){
          try {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `${fileName}`;

            const { data: uploadData, error: uploadError } = await repo.uploadImage('product-images', filePath, file);
            
            if (uploadError) throw uploadError;

            // Obtenemos la URL pública
            publicUrl = repo.getPublicUrl('product-images', filePath);
            console.log("Imagen subida con éxito:", publicUrl);
        } catch (error) {
            console.error("Error subiendo imagen:", error);
            return alert("Error al subir la imagen.");
        }
      }
        if (!tipo) return alert("Seleccioná un tipo de producto");
        const config = PRODUCT_CONFIG[tipo];
        const builder = config.builder();

        builder.setName(document.getElementById('nombre').value)
               .setPrice(parseFloat(document.getElementById('precio').value))
               .setStock(parseInt(document.getElementById('stock').value))
               .setCategory(tipo)
               .setDescription("Carga desde panel admin")
               .setImageUrl(publicUrl);

        config.fields.forEach(campo => {
          const inputExtra = document.getElementById(`extra-${campo.id}`);
          if (inputExtra && builder[campo.setter]) {
            builder[campo.setter](inputExtra.value);
          }
        });

        const productoFinal = builder.build();

        try {
          btnSave.disnable = true;
          btnSave.textContent = "Guardando...";
          console.log("Enviando producto...", productoFinal);
          await repo.saveProduct(productoFinal);
          alert("¡Producto guardado y sincronizado!");
        } catch (error) {
          console.error("Error en el flujo de guardado:", error);
          alert("Hubo un error al guardar.");
        }
      });
    }
  });
</script>
</body>
</html>
