<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Admin - Retro Vibes Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Oswald:wght@300;400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- =====================================================
    SUPABASE — completá estos dos valores con los tuyos:
    Supabase → Settings → API
    → "Project URL"  pegalo en SUPABASE_URL
    → "anon public"  pegalo en SUPABASE_KEY
  ====================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://TUPROYECTO.supabase.co'  // ← reemplazá
    const SUPABASE_KEY = 'TU_ANON_KEY'                      // ← reemplazá
    const TABLA        = 'productos'                         // ← nombre de tu tabla

    // Estructura de la tabla en Supabase:
    // id          → int8, primary key, generated always
    // nombre      → text
    // categoria   → text   (Vinilo / Pañuelo / Anteojos)
    // precio      → int8
    // stock       → text   (ok / low / out)
    // descripcion → text
    // imagen      → text   (URL de Supabase Storage)

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  </script>
</head>

<body class="home-page">
<div class="shell">

  <!-- ══ HEADER ADMIN ══ -->
  <header class="masthead">
    <div class="ornament-line">✦ Panel de Administración ✦</div>
    <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    <div class="brand-tagline">Vinyls · Bandannas · Glasses · Est. 1974</div>
    <div class="masthead-rule"></div>
  </header>

  <!-- ══ NAV ══ -->
  <div class="nav-band">
    <button class="nav-item active" onclick="showTab('tab-productos', this)">Productos</button>
    <button class="nav-item" onclick="showTab('tab-pedidos', this)">Pedidos</button>
    <a href="paginabase.html" class="nav-item">← Volver a la tienda</a>
  </div>

  <!-- ══ TAB PRODUCTOS ══ -->
  <div id="tab-productos">

    <div class="section-head">
      <h1 class="section-title">Productos</h1>
      <div class="section-rule"></div>
      <p class="section-sub" id="subtitulo">Cargando...</p>
    </div>

    <!-- Buscador + botón agregar -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
      <input type="text" id="search-input" placeholder="Buscar producto..."
        style="max-width:260px;" oninput="filtrarProductos()"/>
      <button class="btn-primary" onclick="abrirModal()">+ Agregar producto</button>
    </div>

    <!-- Cabecera tabla -->
    <div style="display:grid; grid-template-columns:70px 1fr 110px 110px 100px 120px; gap:12px; padding:10px 16px; background:var(--ink); color:var(--paper);">
      <span class="step-label">Imagen</span>
      <span class="step-label">Producto</span>
      <span class="step-label">Precio</span>
      <span class="step-label">Categoría</span>
      <span class="step-label">Stock</span>
      <span class="step-label">Acciones</span>
    </div>

    <!-- Filas generadas por JS -->
    <div id="prod-list" style="border:2px solid var(--ink); border-top:none;">
      <div style="padding:32px; text-align:center; background:var(--cream);">
        <span class="section-sub">Conectando con Supabase...</span>
      </div>
    </div>

  </div>

  <!-- ══ TAB PEDIDOS ══ -->
  <div id="tab-pedidos" style="display:none;">
    <div class="section-head">
      <h1 class="section-title">Pedidos</h1>
      <div class="section-rule"></div>
      <p class="section-sub">Próximamente</p>
    </div>
  </div>

</div><!-- /shell -->

<!-- ══ MODAL ══ -->
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; align-items:center; justify-content:center; padding:20px;">
  <div style="background:var(--cream); width:100%; max-width:560px; max-height:90vh; overflow-y:auto;">

    <!-- Cabecera modal -->
    <div style="background:var(--ink); color:var(--paper); padding:14px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0;">
      <span class="step-label" id="modal-title">Agregar producto</span>
      <button onclick="cerrarModal()" class="prod-btn" style="color:var(--paper); border-color:rgba(255,255,255,.3); padding:4px 10px;">✕</button>
    </div>

    <!-- Formulario -->
    <div style="padding:24px;">
      <div class="form-grid">

        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" id="f-nombre" placeholder="Ej: Led Zeppelin IV"/>
        </div>

        <div class="form-group">
          <label>Categoría *</label>
          <select id="f-categoria">
            <option value="">— Seleccionar —</option>
            <option value="Vinilo">Vinilo</option>
            <option value="Pañuelo">Pañuelo</option>
            <option value="Anteojos">Anteojos</option>
          </select>
        </div>

        <div class="form-group">
          <label>Precio ($) *</label>
          <input type="number" id="f-precio" placeholder="8500"/>
        </div>

        <div class="form-group">
          <label>Stock *</label>
          <select id="f-stock">
            <option value="ok">Disponible</option>
            <option value="low">Pocas unidades</option>
            <option value="out">Sin stock</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Descripción</label>
          <input type="text" id="f-desc" placeholder="Ej: 1971 · Rock clásico"/>
        </div>

        <!-- URL imagen de Supabase Storage
             Cómo obtenerla: Supabase → Storage → tu bucket → click en imagen → Copy URL
             Formato: https://TUPROYECTO.supabase.co/storage/v1/object/public/BUCKET/archivo.jpg -->
        <div class="form-group full">
          <label>URL de imagen (Supabase Storage)</label>
          <input type="text" id="f-img"
            placeholder="https://TUPROYECTO.supabase.co/storage/v1/object/public/productos/imagen.jpg"
            oninput="previewImg()"/>
          <img id="img-preview" style="display:none; width:100%; height:140px; object-fit:cover; margin-top:10px; border:1px solid var(--paper-deep);" alt="preview"/>
        </div>

      </div>
    </div>

    <!-- Footer modal -->
    <div style="padding:14px 24px; background:var(--paper-dark); display:flex; gap:12px; justify-content:flex-end; border-top:1px solid var(--paper-deep);">
      <button class="btn-back" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary" id="btn-guardar" onclick="guardarProducto()">Guardar producto</button>
    </div>

  </div>
</div>

<div id="toast">Guardado</div>

<script>
  let todosLosProductos = []
  let editingId = null

  /* ── Helpers ── */
  function fmt(n) { return '$' + Number(n).toLocaleString('es-AR') }

  function stockBadge(s) {
    const cfg = {
      ok:  { bg:'#1a4a1a', color:'#6ddc6d', txt:'Disponible' },
      low: { bg:'#4a3a00', color:'#e0c040', txt:'Poco stock' },
      out: { bg:'#4a1010', color:'#e06060', txt:'Sin stock'  },
    }
    const c = cfg[s] || cfg.out
    return `<span class="prod-cat" style="background:${c.bg}; color:${c.color}; padding:3px 8px;">${c.txt}</span>`
  }

  function emoji(cat) {
    return cat === 'Vinilo' ? '🎵' : cat === 'Anteojos' ? '🕶️' : '🧣'
  }

  /* ── Render tabla ── */
  function renderProductos(lista) {
    document.getElementById('subtitulo').textContent =
      `${todosLosProductos.length} productos en el catálogo`

    const cont = document.getElementById('prod-list')

    if (!lista.length) {
      cont.innerHTML = `<div style="padding:28px; text-align:center; background:var(--cream);">
        <span class="section-sub">No se encontraron productos</span></div>`
      return
    }

    cont.innerHTML = lista.map(p => `
      <div style="display:grid; grid-template-columns:70px 1fr 110px 110px 100px 120px; gap:12px; padding:12px 16px; background:var(--cream); border-bottom:1px solid var(--paper-dark); align-items:center;">

        ${p.imagen
          ? `<img src="${p.imagen}" style="width:70px; height:52px; object-fit:cover; display:block; border:1px solid var(--paper-deep);"
               onerror="this.outerHTML='<div style=\'width:70px;height:52px;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;font-size:1.2rem;\'>${emoji(p.categoria)}</div>'">`
          : `<div style="width:70px; height:52px; background:var(--paper-dark); display:flex; align-items:center; justify-content:center; font-size:1.2rem;">${emoji(p.categoria)}</div>`
        }

        <div>
          <div class="prod-name">${p.nombre}</div>
          <div class="prod-cat">${p.descripcion || ''}</div>
        </div>

        <div class="prod-price">${fmt(p.precio)}</div>
        <div class="prod-cat">${p.categoria}</div>
        <div>${stockBadge(p.stock)}</div>

        <div style="display:flex; gap:6px;">
          <button class="prod-btn" style="padding:5px 10px; font-size:8px;" onclick="editarProducto(${p.id})">Editar</button>
          <button class="prod-btn" style="padding:5px 10px; font-size:8px; color:var(--red); border-color:var(--red);" onclick="eliminarProducto(${p.id})">✕</button>
        </div>

      </div>
    `).join('')
  }

  /* ── Cargar desde Supabase ── */
  async function cargarProductos() {
    try {
      const { data, error } = await sb.from(TABLA).select('*').order('id')
      if (error) throw error
      todosLosProductos = data
      renderProductos(data)
    } catch (err) {
      document.getElementById('prod-list').innerHTML =
        `<div style="padding:28px; text-align:center; background:var(--cream);">
          <span class="prod-price">Error al conectar con Supabase</span><br>
          <span class="section-sub">Verificá SUPABASE_URL y SUPABASE_KEY en el código</span>
        </div>`
    }
  }

  /* ── Filtrar ── */
  function filtrarProductos() {
    const q = document.getElementById('search-input').value.toLowerCase()
    renderProductos(todosLosProductos.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.categoria || '').toLowerCase().includes(q)
    ))
  }

  /* ── Modal ── */
  function abrirModal(id = null) {
    editingId = id
    document.getElementById('modal-title').textContent = id ? 'Editar producto' : 'Agregar producto'

    if (id) {
      const p = todosLosProductos.find(x => x.id === id)
      document.getElementById('f-nombre').value    = p.nombre      || ''
      document.getElementById('f-categoria').value = p.categoria   || ''
      document.getElementById('f-precio').value    = p.precio      || ''
      document.getElementById('f-stock').value     = p.stock       || 'ok'
      document.getElementById('f-desc').value      = p.descripcion || ''
      document.getElementById('f-img').value       = p.imagen      || ''
      previewImg()
    } else {
      ['f-nombre','f-precio','f-desc','f-img'].forEach(i => document.getElementById(i).value = '')
      document.getElementById('f-categoria').selectedIndex = 0
      document.getElementById('f-stock').selectedIndex = 0
      document.getElementById('img-preview').style.display = 'none'
    }

    document.getElementById('modal-overlay').style.display = 'flex'
  }

  function cerrarModal() {
    document.getElementById('modal-overlay').style.display = 'none'
    editingId = null
  }

  function previewImg() {
    const url = document.getElementById('f-img').value.trim()
    const prev = document.getElementById('img-preview')
    prev.style.display = url ? 'block' : 'none'
    prev.src = url
  }

  /* ── Guardar (insert o update) ── */
  async function guardarProducto() {
    const nombre      = document.getElementById('f-nombre').value.trim()
    const categoria   = document.getElementById('f-categoria').value
    const precio      = parseInt(document.getElementById('f-precio').value)
    const stock       = document.getElementById('f-stock').value
    const descripcion = document.getElementById('f-desc').value.trim()
    const imagen      = document.getElementById('f-img').value.trim()

    if (!nombre || !categoria || !precio) {
      mostrarToast('Completá nombre, categoría y precio')
      return
    }

    const btn = document.getElementById('btn-guardar')
    btn.textContent = 'Guardando...'
    btn.disabled = true

    try {
      if (editingId) {
        const { error } = await sb.from(TABLA)
          .update({ nombre, categoria, precio, stock, descripcion, imagen })
          .eq('id', editingId)
        if (error) throw error
        mostrarToast('Producto actualizado ✓')
      } else {
        const { error } = await sb.from(TABLA)
          .insert([{ nombre, categoria, precio, stock, descripcion, imagen }])
        if (error) throw error
        mostrarToast('Producto agregado ✓')
      }
      cerrarModal()
      await cargarProductos()
    } catch (err) {
      mostrarToast('Error: ' + err.message)
    } finally {
      btn.textContent = 'Guardar producto'
      btn.disabled = false
    }
  }

  function editarProducto(id) { abrirModal(id) }

  /* ── Eliminar ── */
  async function eliminarProducto(id) {
    if (!confirm('¿Eliminar este producto?')) return
    try {
      const { error } = await sb.from(TABLA).delete().eq('id', id)
      if (error) throw error
      mostrarToast('Producto eliminado')
      await cargarProductos()
    } catch (err) {
      mostrarToast('Error: ' + err.message)
    }
  }

  /* ── Tabs ── */
  function showTab(tabId, btn) {
    document.getElementById('tab-productos').style.display = tabId === 'tab-productos' ? 'block' : 'none'
    document.getElementById('tab-pedidos').style.display   = tabId === 'tab-pedidos'   ? 'block' : 'none'
    document.querySelectorAll('.nav-band .nav-item').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
  }

  /* ── Toast ── */
  function mostrarToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2800)
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) cerrarModal()
  })

  cargarProductos()
</script>
</body>
</html>
