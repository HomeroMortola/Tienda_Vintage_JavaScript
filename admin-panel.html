<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Admin - Retro Vibes Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Oswald:wght@300;400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- =====================================================
    SUPABASE — reemplazá estos dos valores con los tuyos:
    1. Andá a supabase.com → tu proyecto → Settings → API
    2. Copiá "Project URL"  →  pegalo en SUPABASE_URL
    3. Copiá "anon public"  →  pegalo en SUPABASE_KEY
  ====================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://TUPROYECTO.supabase.co'   // ← reemplazá
    const SUPABASE_KEY = 'TU_ANON_KEY'                       // ← reemplazá

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // =====================================================
    // NOMBRE DE TU TABLA EN SUPABASE
    // Creá una tabla llamada "productos" con estas columnas:
    //   id          → int8, primary key, generated always
    //   nombre      → text
    //   categoria   → text  (Vinilo / Pañuelo / Anteojos)
    //   precio      → int8
    //   stock       → text  (ok / low / out)
    //   descripcion → text
    //   imagen      → text  (URL completa de Supabase Storage)
    // =====================================================
    const TABLA = 'productos'
  </script>

</head>

<body class="home-page">
<div class="shell">

  <!-- Header -->
  <div style="background:var(--ink);color:var(--paper);padding:14px 32px;width:100vw;margin-left:calc(-50vw + 50%);margin-bottom:32px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 12px rgba(0,0,0,.3);">
    <div class="summary-logo" style="border:none;padding:0;margin:0;font-size:1.1rem;">
      <span>Retro</span> Vibes Co. — Admin
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="prod-cat" style="color:rgba(255,255,255,.4);">👤 admin</span>
      <button class="btn-back" style="border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.5);"
        onclick="window.location.href='admin.html'">Salir</button>
    </div>
  </div>

  <!-- Título -->
  <div class="section-head">
    <h1 class="section-title">Productos</h1>
    <div class="section-rule"></div>
    <p class="section-sub" id="subtitulo">Cargando productos...</p>
  </div>

  <!-- Tabs -->
  <div class="nav-band" style="margin-bottom:28px;">
    <button class="nav-item active" onclick="showTab('tab-productos', this)">Productos</button>
    <button class="nav-item" onclick="showTab('tab-pedidos', this)">Pedidos</button>
  </div>

  <!-- ══ TAB PRODUCTOS ══ -->
  <div id="tab-productos">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;border:1.5px solid var(--ink);overflow:hidden;">
        <input type="text" id="search-input" placeholder="Buscar producto..."
          style="border:none;border-bottom:none;padding:8px 14px;background:var(--cream);width:220px;"
          oninput="filtrarProductos()"/>
        <button class="nav-item" style="cursor:default;border:none;">Buscar</button>
      </div>
      <button class="btn-primary" onclick="abrirModal()">+ Agregar producto</button>
    </div>

    <!-- Cabecera tabla -->
    <div style="display:grid;grid-template-columns:70px 1fr 110px 110px 100px 120px;gap:12px;padding:10px 16px;background:var(--ink);color:var(--paper);">
      <span class="step-label">Imagen</span>
      <span class="step-label">Producto</span>
      <span class="step-label">Precio</span>
      <span class="step-label">Categoría</span>
      <span class="step-label">Stock</span>
      <span class="step-label">Acciones</span>
    </div>
    <div id="prod-list" style="border:2px solid var(--ink);border-top:none;">
      <div style="padding:32px;text-align:center;font-style:italic;color:var(--ink-muted);background:var(--cream);">
        Conectando con Supabase...
      </div>
    </div>

  </div>

  <!-- ══ TAB PEDIDOS ══ -->
  <div id="tab-pedidos" style="display:none;">
    <div style="padding:48px;text-align:center;font-style:italic;color:var(--ink-muted);background:var(--cream);border:2px solid var(--ink);">
      Sección de pedidos — próximamente
    </div>
  </div>

</div><!-- /shell -->

<!-- ══ MODAL AGREGAR / EDITAR ══ -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--cream);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;">

    <div style="background:var(--ink);color:var(--paper);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;">
      <span class="step-label" id="modal-title">Agregar producto</span>
      <button onclick="cerrarModal()" style="background:transparent;border:none;color:rgba(255,255,255,.5);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>

    <div style="padding:24px;">
      <div class="form-grid">

        <div class="form-group">
          <label>Nombre del producto *</label>
          <input type="text" id="f-nombre" placeholder="Ej: Led Zeppelin IV"/>
        </div>

        <div class="form-group">
          <label>Categoría *</label>
          <select id="f-categoria">
            <option value="">— Seleccionar —</option>
            <option value="Vinilo">Vinilo</option>
            <option value="Pañuelo">Pañuelo</option>
            <option value="Anteojos">Anteojos</option>
          </select>
        </div>

        <div class="form-group">
          <label>Precio ($) *</label>
          <input type="number" id="f-precio" placeholder="8500"/>
        </div>

        <div class="form-group">
          <label>Stock *</label>
          <select id="f-stock">
            <option value="ok">Disponible</option>
            <option value="low">Pocas unidades</option>
            <option value="out">Sin stock</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Descripción</label>
          <input type="text" id="f-desc" placeholder="Ej: 1971 · Rock clásico"/>
        </div>

        <!-- =====================================================
          IMAGEN — pegá la URL completa de Supabase Storage
          Formato: https://TUPROYECTO.supabase.co/storage/v1/object/public/BUCKET/archivo.jpg
          Para obtenerla: Supabase → Storage → tu bucket → click en la imagen → Copy URL
        ====================================================== -->
        <div class="form-group full">
          <label>URL de imagen (Supabase Storage)</label>
          <input type="text" id="f-img" placeholder="https://TUPROYECTO.supabase.co/storage/v1/object/public/productos/imagen.jpg"/>
          <div id="img-preview-wrap" style="margin-top:10px;display:none;">
            <img id="img-preview" style="width:100%;height:140px;object-fit:cover;border:1px solid var(--paper-deep);display:block;" alt="Preview"/>
          </div>
        </div>

      </div>
    </div>

    <div style="padding:14px 24px;background:var(--paper-dark);display:flex;gap:12px;justify-content:flex-end;border-top:1px solid var(--paper-deep);">
      <button class="btn-back" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary" id="btn-guardar" onclick="guardarProducto()">Guardar producto</button>
    </div>

  </div>
</div>

<div id="toast">Guardado</div>

<script>
  let todosLosProductos = []
  let editingId = null

  /* ══ UTILIDADES ══ */
  function fmt(n) { return '$' + Number(n).toLocaleString('es-AR') }

  function stockLabel(s) {
    const cfg = {
      ok:  { bg:'#1a4a1a', color:'#6ddc6d', txt:'Disponible' },
      low: { bg:'#4a3a00', color:'#e0c040', txt:'Poco stock' },
      out: { bg:'#4a1010', color:'#e06060', txt:'Sin stock'  },
    }
    const c = cfg[s] || cfg.out
    return `<span class="prod-badge" style="position:static;clip-path:none;padding:3px 8px;font-size:8px;background:${c.bg};color:${c.color};">${c.txt}</span>`
  }

  function iconoCat(cat) {
    if (cat === 'Vinilo')   return '🎵'
    if (cat === 'Anteojos') return '🕶️'
    return '🧣'
  }

  /* ══ RENDER TABLA ══ */
  function renderProductos(lista) {
    const cont = document.getElementById('prod-list')
    document.getElementById('subtitulo').textContent =
      `${todosLosProductos.length} productos en el catálogo`

    if (!lista.length) {
      cont.innerHTML = '<div style="padding:28px;text-align:center;font-style:italic;color:var(--ink-muted);background:var(--cream);">No se encontraron productos</div>'
      return
    }

    cont.innerHTML = lista.map(p => `
      <div style="display:grid;grid-template-columns:70px 1fr 110px 110px 100px 120px;gap:12px;padding:12px 16px;background:var(--cream);border-bottom:1px solid var(--paper-dark);align-items:center;">

        ${ p.imagen
          ? `<img src="${p.imagen}" style="width:70px;height:52px;object-fit:cover;border:1px solid var(--paper-deep);display:block;" onerror="this.outerHTML='<div style=\'width:70px;height:52px;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;font-size:1.2rem;\'>${iconoCat(p.categoria)}</div>'">`
          : `<div style="width:70px;height:52px;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">${iconoCat(p.categoria)}</div>`
        }

        <div>
          <div class="prod-name">${p.nombre}</div>
          <div class="prod-cat">${p.descripcion || ''}</div>
        </div>

        <div class="prod-price">${fmt(p.precio)}</div>
        <div class="prod-cat">${p.categoria}</div>
        <div>${stockLabel(p.stock)}</div>

        <div style="display:flex;gap:6px;">
          <button class="prod-btn" style="padding:5px 10px;font-size:8px;" onclick="editarProducto(${p.id})">Editar</button>
          <button class="prod-btn" style="padding:5px 10px;font-size:8px;color:var(--red);border-color:var(--red);" onclick="eliminarProducto(${p.id})">✕</button>
        </div>

      </div>
    `).join('')
  }

  /* ══ CARGAR DESDE SUPABASE ══ */
  async function cargarProductos() {
    try {
      const { data, error } = await sb
        .from(TABLA)
        .select('*')
        .order('id', { ascending: true })

      if (error) throw error

      todosLosProductos = data
      renderProductos(data)

    } catch (err) {
      console.error('Error Supabase:', err)
      document.getElementById('prod-list').innerHTML =
        `<div style="padding:28px;text-align:center;color:var(--red);background:var(--cream);">
          Error al conectar con Supabase.<br>
          <small style="font-style:italic;color:var(--ink-muted);">Verificá SUPABASE_URL y SUPABASE_KEY en el código.</small>
        </div>`
    }
  }

  /* ══ FILTRAR ══ */
  function filtrarProductos() {
    const q = document.getElementById('search-input').value.toLowerCase()
    renderProductos(todosLosProductos.filter(p =>
      p.nombre.toLowerCase().includes(q) ||
      (p.categoria || '').toLowerCase().includes(q) ||
      (p.descripcion || '').toLowerCase().includes(q)
    ))
  }

  /* ══ MODAL ══ */
  function abrirModal(id = null) {
    editingId = id
    document.getElementById('modal-title').textContent = id ? 'Editar producto' : 'Agregar producto'

    if (id) {
      const p = todosLosProductos.find(x => x.id === id)
      document.getElementById('f-nombre').value    = p.nombre    || ''
      document.getElementById('f-categoria').value = p.categoria || ''
      document.getElementById('f-precio').value    = p.precio    || ''
      document.getElementById('f-stock').value     = p.stock     || 'ok'
      document.getElementById('f-desc').value      = p.descripcion || ''
      document.getElementById('f-img').value       = p.imagen    || ''
      mostrarPreview(p.imagen)
    } else {
      ['f-nombre','f-precio','f-desc','f-img'].forEach(id => document.getElementById(id).value = '')
      document.getElementById('f-categoria').selectedIndex = 0
      document.getElementById('f-stock').selectedIndex = 0
      ocultarPreview()
    }

    document.getElementById('modal-overlay').style.display = 'flex'
  }

  function cerrarModal() {
    document.getElementById('modal-overlay').style.display = 'none'
    editingId = null
  }

  function mostrarPreview(url) {
    if (!url) { ocultarPreview(); return }
    document.getElementById('img-preview').src = url
    document.getElementById('img-preview-wrap').style.display = 'block'
  }

  function ocultarPreview() {
    document.getElementById('img-preview-wrap').style.display = 'none'
  }

  document.getElementById('f-img').addEventListener('input', function() {
    mostrarPreview(this.value.trim())
  })

  /* ══ GUARDAR (INSERT o UPDATE) ══ */
  async function guardarProducto() {
    const nombre    = document.getElementById('f-nombre').value.trim()
    const categoria = document.getElementById('f-categoria').value
    const precio    = parseInt(document.getElementById('f-precio').value)
    const stock     = document.getElementById('f-stock').value
    const descripcion = document.getElementById('f-desc').value.trim()
    const imagen    = document.getElementById('f-img').value.trim()

    if (!nombre || !categoria || !precio) {
      mostrarToast('Completá nombre, categoría y precio')
      return
    }

    const btn = document.getElementById('btn-guardar')
    btn.textContent = 'Guardando...'
    btn.disabled = true

    try {
      if (editingId) {
        // ── UPDATE ──
        const { error } = await sb
          .from(TABLA)
          .update({ nombre, categoria, precio, stock, descripcion, imagen })
          .eq('id', editingId)

        if (error) throw error
        mostrarToast('Producto actualizado ✓')

      } else {
        // ── INSERT ──
        const { error } = await sb
          .from(TABLA)
          .insert([{ nombre, categoria, precio, stock, descripcion, imagen }])

        if (error) throw error
        mostrarToast('Producto agregado ✓')
      }

      cerrarModal()
      await cargarProductos()

    } catch (err) {
      console.error(err)
      mostrarToast('Error al guardar: ' + err.message)
    } finally {
      btn.textContent = 'Guardar producto'
      btn.disabled = false
    }
  }

  /* ══ EDITAR ══ */
  function editarProducto(id) { abrirModal(id) }

  /* ══ ELIMINAR ══ */
  async function eliminarProducto(id) {
    if (!confirm('¿Eliminar este producto? Esta acción no se puede deshacer.')) return

    try {
      const { error } = await sb
        .from(TABLA)
        .delete()
        .eq('id', id)

      if (error) throw error
      mostrarToast('Producto eliminado')
      await cargarProductos()

    } catch (err) {
      console.error(err)
      mostrarToast('Error al eliminar: ' + err.message)
    }
  }

  /* ══ TABS ══ */
  function showTab(tabId, btn) {
    document.getElementById('tab-productos').style.display = tabId === 'tab-productos' ? 'block' : 'none'
    document.getElementById('tab-pedidos').style.display   = tabId === 'tab-pedidos'   ? 'block' : 'none'
    document.querySelectorAll('.nav-band .nav-item').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
  }

  /* ══ TOAST ══ */
  function mostrarToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2800)
  }

  /* Cerrar modal al hacer click fuera */
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal()
  })

  /* ══ INIT ══ */
  cargarProductos()
</script>
</body>
</html>
