<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bandanas - Retro Vibes Co.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Oswald:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

  <!-- Clase bandanna-page en el body activa la imagen del masthead definida en styles.css -->
  <body class="bandanna-page">
    <div class="shell">
      <!-- HEADER -->
      <header class="masthead">
        <div class="brand-name"><span>Retro</span> Vibes Co.</div>
        <div class="brand-tagline">Sección Bandanas</div>
      </header>

      <!-- GRID DE PRODUCTOS -->
      <section class="section active">
        <div class="section-head">
          <h1 class="section-title">Bandanas</h1>
          <p class="section-sub">Vintage y estilo retro</p>
        </div>
        
        <div class="products-grid"></div>
        
        <div class="grid-product"></div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
