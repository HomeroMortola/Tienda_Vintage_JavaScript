<!DOCTYPE html>
<html lang="es">
<head>
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
    }
  }
  </script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retro Vibes Co. - Tienda Vintage</title>
  <link rel="icon" type="image/png" sizes="32x32" href="logook.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>

<body class="home-page">
<div class="shell">

  <!-- ══ MASTHEAD ══ -->
  <header class="masthead">
    <div class="ornament-line">✦ &nbsp; Tienda de artículos vintage &nbsp; ✦</div>
    <div class="brand-name"><span>Retro</span> Vibes Co.</div>
    <div class="brand-tagline">Vinilos · Bandanas · Anteojos · Remeras · Est. 1974</div>
    <div class="masthead-rule"></div>
  </header>

  <!-- ── Banda navegación ── -->
  <nav class="header-row" aria-label="Navegación principal">
    <div class="nav-band">    
      <a href="index.html" class="nav-item active">Catalogo</a>
      <a href="vinilos.html" class="nav-item">Vinilos</a>
      <a href="bandanna.html" class="nav-item">Bandanas</a>
      <a href="anteojos.html" class="nav-item">Anteojos</a>
      <a href="T_Shirts.html" class="nav-item">Remeras</a>
      <a href="carrito.html" class="nav-item">Carrito</a>
    </div>

    <!-- ── boton register ── -->
    <a href="login.html" class="user-btn" title="Registro/Login" style="padding: 5px; display: flex; align-items: center; color: var(--ink-soft); transition: color 0.2s;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </a>
  </nav>

  <main>
    <!-- barra de busqueda -->
    <section class="search-container" aria-label="Buscador de productos">
      <input
        type="text"
        id="product-search"
        class="search-input"
        placeholder="Buscar producto..."
      />
    </section>

    <h1 class="categoria-titulo">Nuestros Productos</h1>

    <section class="grid-product" id="products-grid">
      <!-- Los productos se cargan dinámicamente aquí -->
    </section>
  </main>

  <footer style="text-align:center; margin-top:60px; padding-top:20px; border-top:1px solid var(--paper-deep);">
    <span class="prod-cat" style="font-size:8px; color:var(--paper-deep); letter-spacing:2px;">
      © 1974 Retro Vibes Co. &nbsp;·&nbsp;
      <a href="admin.html" style="color:var(--paper-deep); text-decoration:none;">Admin</a>
    </span>
  </footer>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
